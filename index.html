 <!DOCTYPE html>
<html>
<head>
<title>SK Premium Home Services KL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f6f8;}
header{background:#111;color:white;text-align:center;padding:60px;}
section{padding:20px;max-width:900px;margin:auto;}
input,select{width:100%;padding:10px;margin:8px 0;}
button{background:#25D366;color:white;padding:12px;border:0;width:100%;}
.card{background:white;padding:15px;margin-top:15px;border-radius:10px;}
.float{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50px;}
</style>
</head>

<body>

<header>
<h1>SK Premium Home Services KL</h1>
<p>Curtains • Electrical • Plumbing</p>
</header>

<section>

<h2>Book Service</h2>

<input id="name" placeholder="Your Name">
<input id="area" placeholder="Condo / Area">

<select id="service">
<option>Curtain Installation</option>
<option>Electrical Work</option>
<option>Water Heater</option>
<option>Plumbing</option>
</select>

<button onclick="send()">Send Request</button>

</section>

<section class="card">
<h2>Top Condos</h2>
<p>Helix Residences • Vira Residences • Sunway Serene • Maple Residences</p>
</section>

<a class="float" href="https://wa.me/60168121996">Chat</a>

<script>
function send(){

  let name=document.getElementById("name").value;
  let area=document.getElementById("area").value;
  let service=document.getElementById("service").value;

  let msg = "Hi I am " + name + 
  " from " + area + 
  " need " + service;

  // WhatsApp
  window.open("https://wa.me/60168121996?text="+encodeURIComponent(msg));

  // CRM SEND (PASTE YOUR SCRIPT URL HERE)
  fetch("PASTE_YOUR_SCRIPT_URL_HERE", {
    method:"POST",
    body: JSON.stringify({
      name:name,
      area:area,
      service:service,
      message:msg
    })
  });

}
</script>

</body>
</html>
