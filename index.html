<!DOCTYPE html>
<html>
<head>
<title>SK Premium Home Services KL</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#111;color:white;text-align:center;padding:60px;}
section{max-width:900px;margin:auto;padding:20px;}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#25D366;
color:white;
border:0;
font-weight:bold;
border-radius:6px;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>SK Premium Home Services KL</h1>
<p>Curtains • Electrical • Plumbing • Water Heater</p>
</header>

<section>

<h2>Book Your Service</h2>

<input id="name" placeholder="Your Name">
<input id="area" placeholder="Condo / Area">

<select id="service">
<option>Curtain Installation</option>
<option>Electrical Work</option>
<option>Plumbing Service</option>
<option>Water Heater Install</option>
</select>

<select id="time">
<option>Today Morning</option>
<option>Today Evening</option>
<option>Tomorrow Morning</option>
<option>Tomorrow Evening</option>
</select>

<button onclick="book()">Confirm Booking</button>

</section>

<section class="card">
<h2>We Serve KL Condos</h2>
<p>Helix Residences • Vira Residences • Sunway Serene • Maple Residences • KLCC • PJ • Cheras</p>
</section>

<a class="float" href="https://wa.me/60168121996">WhatsApp</a>

<script>
function book(){

let name=document.getElementById("name").value;
let area=document.getElementById("area").value;
let service=document.getElementById("service").value;
let time=document.getElementById("time").value;

let msg="BOOKING REQUEST:%0AName: "+name+"%0AArea: "+area+"%0AService: "+service+"%0ATime: "+time;

window.open("https://wa.me/60168121996?text="+msg);

// CRM + FOLLOWUP READY HO SAKTA HAI (Google Script connect later)
alert("Booking sent. We will contact you shortly.");

}
</script>

</body>
</html>
